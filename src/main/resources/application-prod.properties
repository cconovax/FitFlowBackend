spring.application.name=fitflow

# Server
server.port=${SERVER_PORT}

server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:on_param}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Multipart
# Directorio donde se almacenaran las fotos
app.upload.dir=${APP_UPLOAD_DIR}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.rate-limit.login.capacity=${RATE_LIMIT_LOGIN}

# Register / Onboarding: max 3 intentos/min por IP
app.rate-limit.register.capacity=${RATE_LIMIT_REGISTER}

# API general: max 200 req/min por IP
app.rate-limit.api.capacity=${RATE_LIMIT_API}

# Hikari — sensible defaults for server deployments
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}

springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS}
