spring.application.name=fitflow

spring.profiles.default=dev

# Server
server.port=${SERVER_PORT:8080}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
# Coma-separated list. Example: http://localhost:5173,http://localhost:3000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}

app.upload.dir=${APP_UPLOAD_DIR:uploads}

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Rate limiting (requests per minute per IP)
# Login: max 5 intentos/min por IP
app.rate-limit.login.capacity=${RATE_LIMIT_LOGIN:5}
# Register / Onboarding: max 3 intentos/min por IP
app.rate-limit.register.capacity=${RATE_LIMIT_REGISTER:3}
# API general: max 200 req/min por IP
app.rate-limit.api.capacity=${RATE_LIMIT_API:200}
