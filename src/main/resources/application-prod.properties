# Production — set SPRING_PROFILES_ACTIVE=prod and provide secrets via env / secrets manager

server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:on_param}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}

# PostgreSQL — required in production (no insecure defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari — sensible defaults for server deployments
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}

# JPA — no auto schema mutation; use migrations or controlled DDL
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT — must be set (no default)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe — must be set (no default)
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# OpenAPI / Swagger — desactivado en producción (superficie de ataque).
# Solo en red privada / staging: SWAGGER_ENABLED=true (sigue sin auth; mejor VPN o IP allowlist delante).
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
