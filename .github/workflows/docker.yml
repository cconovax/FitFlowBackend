name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build
        run: |
          docker build -t ghcr.io/cconovax/fitflowfrontend:latest .

      - name: Push
        run: |
          docker push ghcr.io/cconovax/fitflowfrontend:latest